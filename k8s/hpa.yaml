apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: work-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: work-api
  minReplicas: 1
  maxReplicas: 20
  metrics:
  - type: Pods
    pods:
      metric:
        name: work_active_requests_custom
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 4
        periodSeconds: 1
      - type: Percent
        value: 100
        periodSeconds: 1
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 1
      - type: Percent
        value: 50
        periodSeconds: 1
      selectPolicy: Max
