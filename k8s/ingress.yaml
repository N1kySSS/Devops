# k8s/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: work-api-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: work.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: work-api
            port:
              number: 8080
