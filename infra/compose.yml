services:
  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: ["vault", "server", "-config=/vault/config/config.hcl"]
    volumes:
      - vault-data:/vault/file
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    ports:
      - "8200:8200"
    networks:
      - infra
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  bootstrap:
    build:
      context: ./bootstrap
      dockerfile: Dockerfile.bootstrap
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - certs:/certs
      - registry-auth:/registry-auth
      - bootstrap-state:/bootstrap-state
    networks:
      - infra
    depends_on:
      vault:
        condition: service_started

  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - infra
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  auth-sync:
    build:
      context: ./bootstrap
      dockerfile: Dockerfile.bootstrap
    environment:
      VAULT_ADDR: http://vault:8200
    entrypoint: ["/bin/bash", "/auth-sync.sh"]
    volumes:
      - registry-auth:/registry-auth
      - bootstrap-state:/bootstrap-state:ro
    networks:
      - infra
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  registry-nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/registry.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/certs:ro
      - registry-auth:/registry-auth:ro
    ports:
      - "5443:5443"
      - "5444:5444"
    networks:
      - infra
    depends_on:
      - registry
      - auth-sync

  dockerd:
    image: docker:27-dind
    privileged: true
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DOCKER_TLS_CERTDIR: ""
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /etc/docker/certs.d/registry-nginx:5443
        mkdir -p /etc/docker/certs.d/registry-nginx:5444
        cp /certs/ca.pem /etc/docker/certs.d/registry-nginx:5443/ca.crt
        cp /certs/ca.pem /etc/docker/certs.d/registry-nginx:5444/ca.crt
        exec dockerd --host=tcp://0.0.0.0:2376 --tlsverify \
          --tlscacert=/certs/ca.pem \
          --tlscert=/certs/dockerd/server.pem \
          --tlskey=/certs/dockerd/server-key.pem
    volumes:
      - certs:/certs:ro
    ports:
      - "2376:2376"
    networks:
      - infra
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    user: root
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    ports:
      - "8081:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
      - certs:/certs:ro
    networks:
      - infra
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      dockerd:
        condition: service_started

networks:
  infra:
    driver: bridge

volumes:
  vault-data:
  certs:
  registry-data:
  registry-auth:
  bootstrap-state:
  jenkins-data:
