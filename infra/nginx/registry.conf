# Reader: только pull (GET/HEAD/OPTIONS). Writer: полный доступ к push/pull.
upstream docker_registry {
    server registry:5000;
}

server {
    listen 5443 ssl;
    server_name registry-nginx localhost;

    ssl_certificate     /certs/registry/server.pem;
    ssl_certificate_key /certs/registry/server-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 0;

    location / {
        limit_except GET HEAD OPTIONS {
            deny all;
        }
        auth_basic "Registry reader";
        auth_basic_user_file /registry-auth/htpasswd_reader;
        proxy_pass http://docker_registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
    }
}

server {
    listen 5444 ssl;
    server_name registry-nginx localhost;

    ssl_certificate     /certs/registry/server.pem;
    ssl_certificate_key /certs/registry/server-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 0;

    location / {
        auth_basic "Registry writer";
        auth_basic_user_file /registry-auth/htpasswd_writer;
        proxy_pass http://docker_registry;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900;
        proxy_send_timeout 900;
    }
}
